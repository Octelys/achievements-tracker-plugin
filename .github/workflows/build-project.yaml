name: Build Project
on:
  workflow_dispatch:
    inputs:
      build-macos:
        description: Build for macOS Universal
        type: boolean
        default: true
      build-ubuntu:
        description: Build for Ubuntu x86_64
        type: boolean
        default: true
      build-windows-x64:
        description: Build for Windows x64
        type: boolean
        default: true
      build-windows-arm64:
        description: Build for Windows ARM64
        type: boolean
        default: true
      package:
        description: Create installer / package
        type: choice
        default: 'auto'
        options:
          - 'auto'
          - 'true'
          - 'false'
  workflow_call:
    inputs:
      build-macos:
        description: Build for macOS Universal
        type: boolean
        default: true
      build-ubuntu:
        description: Build for Ubuntu x86_64
        type: boolean
        default: true
      build-windows-x64:
        description: Build for Windows x64
        type: boolean
        default: true
      build-windows-arm64:
        description: Build for Windows ARM64
        type: boolean
        default: true
      package:
        description: >
          Override the package (installer) flag.
          'auto' follows the default logic for the event type.
          'true' forces installer creation. 'false' skips it.
        type: string
        default: 'auto'
    outputs:
      pluginName:
        description: Project name detected by parsing build spec file
        value: ${{ jobs.check-event.outputs.pluginName }}
      pluginVersion:
        description: Computed plugin version
        value: ${{ jobs.check-event.outputs.pluginVersion }}
      pluginInternalName:
        description: Raw internal name from buildspec.json (used for file naming)
        value: ${{ jobs.check-event.outputs.pluginInternalName }}
      buildMacos:
        value: ${{ jobs.check-event.outputs.buildMacos }}
      buildUbuntu:
        value: ${{ jobs.check-event.outputs.buildUbuntu }}
      buildWindowsX64:
        value: ${{ jobs.check-event.outputs.buildWindowsX64 }}
      buildWindowsArm64:
        value: ${{ jobs.check-event.outputs.buildWindowsArm64 }}
      versionOverride:
        value: ${{ jobs.check-event.outputs.versionOverride }}
jobs:
  check-event:
    name: Check GitHub Event Data 🔎
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    outputs:
      package: ${{ steps.setup.outputs.package }}
      codesign: ${{ steps.setup.outputs.codesign }}
      notarize: ${{ steps.setup.outputs.notarize }}
      config: ${{ steps.setup.outputs.config }}
      commitHash: ${{ steps.setup.outputs.commitHash }}
      pluginName: ${{ steps.setup.outputs.pluginName }}
      pluginVersion: ${{ steps.setup.outputs.pluginVersion }}
      pluginInternalName: ${{ steps.setup.outputs.pluginInternalName }}
      buildMacos: ${{ steps.setup.outputs.buildMacos }}
      buildUbuntu: ${{ steps.setup.outputs.buildUbuntu }}
      buildWindowsX64: ${{ steps.setup.outputs.buildWindowsX64 }}
      buildWindowsArm64: ${{ steps.setup.outputs.buildWindowsArm64 }}
      versionOverride: ${{ steps.setup.outputs.versionOverride }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Event Data ☑️
        id: setup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          : Check Event Data ☑️
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi

          case "${GITHUB_EVENT_NAME}" in
            pull_request)
              config_data=('codesign:false' 'notarize:false' 'package:false' 'config:RelWithDebInfo')
              if gh pr view ${{ github.event.number }} --json labels \
                | jq -e -r '.labels[] | select(.name == "Seeking Testers")' > /dev/null; then
                config_data[0]='codesign:true'
                config_data[2]='package:true'
              fi
              ;;
            push)
              # Only create packages on tagged releases, not on every branch push
              config_data=('codesign:true' 'notarize:false' 'package:false' 'config:RelWithDebInfo')
              if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                config_data[1]='notarize:true'
                config_data[2]='package:true'
                config_data[3]='config:Release'
              fi
              ;;
            workflow_dispatch)
              config_data=('codesign:true' 'notarize:false' 'package:false' 'config:RelWithDebInfo')
              ;;
            schedule)
              # Nightly builds: build all but don't create installers
              config_data=('codesign:true' 'notarize:false' 'package:false' 'config:RelWithDebInfo')
              ;;
            *) ;;
          esac

          for config in "${config_data[@]}"; do
            IFS=':' read -r key value <<< "${config}"
            echo "${key}=${value}" >> $GITHUB_OUTPUT
          done

          # Apply package override from workflow_call/workflow_dispatch input
          package_override='${{ inputs.package }}'
          if [[ "${package_override}" == 'true' ]]; then
            echo "package=true" >> $GITHUB_OUTPUT
          elif [[ "${package_override}" == 'false' ]]; then
            echo "package=false" >> $GITHUB_OUTPUT
          fi

          # Resolve which targets to build from boolean inputs
          # (default true when called from push/PR/schedule with no inputs)
          [[ '${{ inputs.build-macos }}'         != 'false' ]] && echo "buildMacos=true"        >> $GITHUB_OUTPUT || echo "buildMacos=false"        >> $GITHUB_OUTPUT
          [[ '${{ inputs.build-ubuntu }}'        != 'false' ]] && echo "buildUbuntu=true"       >> $GITHUB_OUTPUT || echo "buildUbuntu=false"       >> $GITHUB_OUTPUT
          [[ '${{ inputs.build-windows-x64 }}'   != 'false' ]] && echo "buildWindowsX64=true"   >> $GITHUB_OUTPUT || echo "buildWindowsX64=false"   >> $GITHUB_OUTPUT
          [[ '${{ inputs.build-windows-arm64 }}' != 'false' ]] && echo "buildWindowsArm64=true" >> $GITHUB_OUTPUT || echo "buildWindowsArm64=false" >> $GITHUB_OUTPUT

          echo "commitHash=${GITHUB_SHA:0:9}" >> $GITHUB_OUTPUT

          plugin_name="$(jq -r '.name' buildspec.json)"
          plugin_display_name="$(jq -r '.displayName // empty' buildspec.json)"
          echo "pluginInternalName=${plugin_name}" >> $GITHUB_OUTPUT
          echo "pluginName=${plugin_display_name:-${plugin_name}}" >> $GITHUB_OUTPUT

          # If running on a Git tag, use the tag as the version (strip leading 'v').
          # Otherwise compute: YY.MMDD.BuildNumber
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            plugin_version="${GITHUB_REF_NAME#v}"
            echo "versionOverride=${plugin_version}" >> $GITHUB_OUTPUT
          else
            plugin_version="$(date -u +'%y.%-m%d').${GITHUB_RUN_NUMBER}"
            echo "versionOverride=" >> $GITHUB_OUTPUT
          fi
          echo "pluginVersion=${plugin_version}" >> $GITHUB_OUTPUT


  macos-build:
    name: Build for macOS Universal 🍎
    runs-on: macos-15
    needs: check-event
    if: fromJSON(needs.check-event.outputs.buildMacos)
    defaults:
      run:
        shell: zsh --no-rcs --errexit --pipefail {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set Up Environment 🔧
        run: |
          : Set Up Environment 🔧
          if (( ${+RUNNER_DEBUG} )) setopt XTRACE

          print '::group::Enable Xcode 16.1'
          sudo xcode-select --switch /Applications/Xcode_16.1.0.app/Contents/Developer
          print '::endgroup::'

          print '::group::Clean Homebrew Environment'
          local -a unwanted_formulas=()
          local -a remove_formulas=()
          for formula (${unwanted_formulas}) {
            if [[ -d ${HOMEBREW_PREFIX}/Cellar/${formula} ]] remove_formulas+=(${formula})
          }
          if (( #remove_formulas )) brew uninstall --ignore-dependencies ${remove_formulas}
          print '::endgroup::'

      - uses: actions/cache/restore@v4
        id: ccache-cache
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-ccache-${{ needs.check-event.outputs.config }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Set Up Codesigning 🔑
        uses: ./.github/actions/setup-macos-codesigning
        if: fromJSON(needs.check-event.outputs.codesign)
        id: codesign
        with:
          codesignIdentity: ${{ secrets.MACOS_SIGNING_APPLICATION_IDENTITY }}
          installerIdentity: ${{ secrets.MACOS_SIGNING_INSTALLER_IDENTITY }}
          codesignCertificate: ${{ secrets.MACOS_SIGNING_CERT }}
          certificatePassword: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
          keychainPassword: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          provisioningProfile: ${{ secrets.MACOS_SIGNING_PROVISIONING_PROFILE }}
          notarizationUser: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
          notarizationPassword: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}

      - name: Build Universal FreeType 🔤
        run: |
          : Build Universal FreeType 🔤
          if (( ${+RUNNER_DEBUG} )) setopt XTRACE
          print '::group::Building Universal FreeType'
          ./scripts/build-universal-freetype.sh
          print '::endgroup::'

      - name: Build Plugin 🧱
        uses: ./.github/actions/build-plugin
        with:
          target: macos-universal
          config: ${{ needs.check-event.outputs.config }}
          codesign: ${{ fromJSON(needs.check-event.outputs.codesign) }}
          codesignIdent: ${{ steps.codesign.outputs.codesignIdent }}
          runTests: 'true'
          coverage: 'true'
          versionOverride: ${{ needs.check-event.outputs.versionOverride }}

      - name: Package Plugin 📀
        uses: ./.github/actions/package-plugin
        with:
          target: macos-universal
          config: ${{ needs.check-event.outputs.config }}
          package: ${{ fromJSON(needs.check-event.outputs.package) }}
          codesign: ${{ fromJSON(needs.check-event.outputs.codesign) && fromJSON(steps.codesign.outputs.haveCodesignIdent) }}
          codesignIdent: ${{ steps.codesign.outputs.codesignIdent }}
          installerIdent: ${{ steps.codesign.outputs.installerIdent }}
          codesignTeam: ${{ steps.codesign.outputs.codesignTeam }}
          notarize: ${{ fromJSON(needs.check-event.outputs.notarize) && fromJSON(steps.codesign.outputs.haveNotarizationUser) }}
          codesignUser: ${{ secrets.MACOS_NOTARIZATION_USERNAME }}
          codesignPass: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          version: ${{ needs.check-event.outputs.pluginVersion }}

      - name: Upload Coverage Report (macOS) 📊
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-macos-${{ needs.check-event.outputs.commitHash }}
          path: ${{ github.workspace }}/build_macos/coverage/html
          if-no-files-found: warn
          retention-days: 14

      - name: Coverage Summary (macOS) 📈
        shell: bash
        run: |
          echo '## 🍎 macOS Coverage Report' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          if command -v gcovr &> /dev/null; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            gcovr -r . build_macos \
              --exclude 'external/' \
              --exclude '_deps/' \
              --exclude 'test/' \
              --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
              --print-summary 2>&1 | tee -a $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo '⚠️ gcovr not available for summary generation' >> $GITHUB_STEP_SUMMARY
          fi
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '📥 Download **coverage-report-macos-${{ needs.check-event.outputs.commitHash }}** artifact for full HTML report.' >> $GITHUB_STEP_SUMMARY

      - name: Upload Artifacts 📡
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-macos-universal-${{ needs.check-event.outputs.commitHash }}
          path: ${{ github.workspace }}/release/${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-macos-universal.*

      - name: Upload Debug Symbol Artifacts 🪲
        uses: actions/upload-artifact@v4
        if: ${{ needs.check-event.outputs.config == 'Release' }}
        with:
          name: ${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-macos-universal-${{ needs.check-event.outputs.commitHash }}-dSYMs
          path: ${{ github.workspace }}/release/${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-macos-universal-dSYMs.*

      - uses: actions/cache/save@v4
        if: github.event_name != 'pull_request' && steps.ccache-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-ccache-${{ needs.check-event.outputs.config }}

  ubuntu-build:
    name: Build for Ubuntu x86_64 🐧
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    needs: check-event
    if: fromJSON(needs.check-event.outputs.buildUbuntu)
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/cache/restore@v4
        id: ccache-cache
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-${{ matrix.os }}-ccache-x86_64-${{ needs.check-event.outputs.config }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-ccache-x86_64-

      - name: Build Plugin 🧱
        uses: ./.github/actions/build-plugin
        with:
          target: x86_64
          config: ${{ needs.check-event.outputs.config }}
          runTests: 'true'
          coverage: 'true'
          versionOverride: ${{ needs.check-event.outputs.versionOverride }}

      - name: Package Plugin 📀
        uses: ./.github/actions/package-plugin
        with:
          target: x86_64
          config: ${{ needs.check-event.outputs.config }}
          package: ${{ fromJSON(needs.check-event.outputs.package) }}
          version: ${{ needs.check-event.outputs.pluginVersion }}

      - name: Upload Coverage Report 📊
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ needs.check-event.outputs.commitHash }}
          path: ${{ github.workspace }}/build_x86_64/coverage/html
          if-no-files-found: warn
          retention-days: 14

      - name: Coverage Summary (Ubuntu) 📈
        shell: bash
        run: |
          echo '## 🐧 Ubuntu Coverage Report' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          if command -v gcovr &> /dev/null; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            gcovr -r . build_x86_64 \
              --exclude 'external/' \
              --exclude '_deps/' \
              --exclude 'test/' \
              --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
              --print-summary 2>&1 | tee -a $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo '⚠️ gcovr not available for summary generation' >> $GITHUB_STEP_SUMMARY
          fi
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '📥 Download **coverage-report-${{ needs.check-event.outputs.commitHash }}** artifact for full HTML report.' >> $GITHUB_STEP_SUMMARY

      - name: Upload Source Tarball 🗜️
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-${{ matrix.os }}-sources-${{ needs.check-event.outputs.commitHash }}
          path: ${{ github.workspace }}/release/${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-source.*

      - name: Upload Artifacts 📡
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-${{ matrix.os }}-x86_64-${{ needs.check-event.outputs.commitHash }}
          path: |
            ${{ github.workspace }}/release/${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-x86_64.zip
            ${{ github.workspace }}/release/${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-x86_64.tar.xz
            ${{ github.workspace }}/release/${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-x86_64*.deb

      - name: Upload debug symbol artifacts 🪲
        uses: actions/upload-artifact@v4
        if: ${{ fromJSON(needs.check-event.outputs.package) }}
        with:
          name: ${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-${{ matrix.os }}-x86_64-${{ needs.check-event.outputs.commitHash }}-dbgsym
          path: ${{ github.workspace }}/release/${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-x86_64*-dbgsym.ddeb

      - uses: actions/cache/save@v4
        if: github.event_name != 'pull_request' && steps.ccache-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-${{ matrix.os }}-ccache-x86_64-${{ needs.check-event.outputs.config }}

  windows-build:
    name: Build for Windows x64 🪟
    runs-on: windows-2022
    needs: check-event
    if: fromJSON(needs.check-event.outputs.buildWindowsX64)
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies 🔐
        run: |
          # Update vcpkg to the latest port definitions before installing.
          # The port snapshots bundled with the windows-2022 runner image can
          # become stale: if GitHub regenerates a release tarball the recorded
          # SHA-512 hash in the port no longer matches and the download fails.
          # Pulling the latest vcpkg tree ensures we get corrected hashes.
          git -C "$env:VCPKG_INSTALLATION_ROOT" pull --ff-only

          # Install OpenSSL and libwebsockets for x64 via vcpkg.
          # The obs-deps prebuilt package does not ship either on Windows.
          # The system OpenSSL must be replaced with the vcpkg one: the system
          # build was compiled without WIN32_LEAN_AND_MEAN, causing winsock.h
          # (v1) to be included before winsock2.h (v2) → struct redefinition
          # errors when libwebsockets.h is included in the same translation unit.
          # Use the static-md triplet: static libraries linked against the dynamic
          # CRT (/MD), matching what the OBS plugin itself is built with.
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install openssl:x64-windows-static-md libwebsockets:x64-windows-static-md
          $depsRoot = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          "CMAKE_PREFIX_PATH=$depsRoot" >> $env:GITHUB_ENV

      - name: Build Plugin 🧱
        uses: ./.github/actions/build-plugin
        with:
          target: x64
          config: ${{ needs.check-event.outputs.config }}
          runTests: 'true'
          coverage: 'true'
          versionOverride: ${{ needs.check-event.outputs.versionOverride }}

      - name: Package Plugin 📀
        uses: ./.github/actions/package-plugin
        with:
          target: x64
          config: ${{ needs.check-event.outputs.config }}
          package: ${{ fromJSON(needs.check-event.outputs.package) }}
          version: ${{ needs.check-event.outputs.pluginVersion }}

      - name: Upload Artifacts 📡
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-windows-x64-${{ needs.check-event.outputs.commitHash }}
          path: ${{ github.workspace }}/release/${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-windows-x64*.*

  windows-arm64-build:
    name: Build for Windows ARM64 🪟
    runs-on: windows-2022
    needs: check-event
    if: fromJSON(needs.check-event.outputs.buildWindowsArm64)
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install OpenSSL for ARM64 🔐
        run: |
          # Update vcpkg to the latest port definitions before installing.
          # See the x64 step for the full explanation.
          git -C "$env:VCPKG_INSTALLATION_ROOT" pull --ff-only

          # Install OpenSSL and libwebsockets for ARM64 via vcpkg.
          # The windows-2022 runner ships vcpkg at $env:VCPKG_INSTALLATION_ROOT.
          # The system OpenSSL is x64-only; we need an arm64-windows build.
          # Use the static-md triplet: static libraries linked against the dynamic
          # CRT (/MD), matching what the OBS plugin itself is built with.
          # (arm64-windows-static uses /MT which conflicts with /MD → LNK4098)
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install openssl:arm64-windows-static-md libwebsockets:arm64-windows-static-md
          $depsRoot = "$env:VCPKG_INSTALLATION_ROOT\installed\arm64-windows-static-md"
          # CMake reads CMAKE_PREFIX_PATH from the environment and prepends it to
          # its search path, so both find_package(OpenSSL CONFIG) and module mode
          # will find the ARM64 libraries without any changes to the preset or script.
          "CMAKE_PREFIX_PATH=$depsRoot" >> $env:GITHUB_ENV

      - name: Build Plugin 🧱
        uses: ./.github/actions/build-plugin
        with:
          target: arm64
          config: ${{ needs.check-event.outputs.config }}
          versionOverride: ${{ needs.check-event.outputs.versionOverride }}

      - name: Package Plugin 📀
        uses: ./.github/actions/package-plugin
        with:
          target: arm64
          config: ${{ needs.check-event.outputs.config }}
          package: ${{ fromJSON(needs.check-event.outputs.package) }}
          version: ${{ needs.check-event.outputs.pluginVersion }}

      - name: Upload Artifacts 📡
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-windows-arm64-${{ needs.check-event.outputs.commitHash }}
          path: ${{ github.workspace }}/release/${{ needs.check-event.outputs.pluginInternalName }}-${{ needs.check-event.outputs.pluginVersion }}-windows-arm64*.*
